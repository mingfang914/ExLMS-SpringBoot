version: '3.8'

services:
  # 1. Cấu hình MySQL
  lms-mysql:
    image: mysql:8.4.3
    container_name: lms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root # Mật khẩu root
      MYSQL_DATABASE: ExLMS            # Tự động tạo database tên là lms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql       # Lưu trữ dữ liệu để không bị mất khi tắt Docker

  # 2. Cấu hình Redis
  lms-redis:
    image: redis:alpine
    container_name: lms-redis
    restart: always
    ports:
      - "6379:6379"

  # 3. Cấu hình MinIO (Lưu trữ file)
  lms-minio:
    image: quay.io/minio/minio
    container_name: lms-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin       # Tài khoản đăng nhập
      MINIO_ROOT_PASSWORD: minioadmin   # Mật khẩu đăng nhập
    ports:
      - "9000:9000"                     # Cổng API cho Spring Boot gọi vào
      - "9001:9001"                     # Cổng giao diện Web (Console)
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data                # Lưu trữ file vật lý
      
  # 4. Web GUI cho MySQL (phpMyAdmin)
  lms-phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: lms-phpmyadmin
    restart: always
    environment:
      PMA_HOST: lms-mysql      # Trỏ chính xác vào tên container MySQL của chúng ta
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8080:80"              # Cổng mở ra web
    depends_on:
      - lms-mysql              # Phải đợi MySQL chạy lên trước

# Khai báo các ổ đĩa ảo (volumes) để lưu dữ liệu vĩnh viễn
volumes:
  mysql_data:
  minio_data: